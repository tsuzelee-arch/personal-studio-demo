<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Studio</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-mark">Personal Studio</div>
      <div class="logo-sub">Creative AI Workspace</div>
    </div>
    <div class="nav-group">
      <div class="nav-cat">工作室</div>
      <div class="nav-item active" data-panel="decode">圖像解碼</div>
      <div class="nav-item" data-panel="prompts">提示詞庫</div>
      <div class="nav-item" data-panel="workflow">簡易工作流</div>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-footer-text">Personal Studio v1.0</div>
    </div>
  </nav>

  <main class="main">
    <header class="topbar">
      <div class="page-title" id="pageTitle">圖像解碼</div>
      <div class="topbar-actions" id="topbarActions"></div>
    </header>
    <div class="content">

      <!-- Panel: 圖像解碼 -->
      <section class="panel active" id="panel-decode">
        <div class="decode-layout">
          <div class="decode-upload-area" id="dropZone">
            <input type="file" id="imageInput" accept="image/*" hidden>
            <div class="drop-icon">&#9707;</div>
            <div class="drop-text">拖曳圖像至此，或</div>
            <button class="btn-primary" id="uploadBtn">選擇圖像</button>
            <div class="drop-hint">支援 JPG、PNG、WEBP</div>
          </div>

          <div class="decode-result hidden" id="decodeResult">
            <div class="decode-preview-wrap">
              <img id="previewImg" src="" alt="preview">
            </div>
            <div class="decode-info">
              <div class="info-block">
                <div class="info-label">色彩色盤</div>
                <div class="palette-row" id="paletteRow"></div>
              </div>
              <div class="info-block">
                <div class="info-label">風格標籤</div>
                <div class="tag-row" id="styleTagRow"></div>
              </div>
              <div class="info-block">
                <div class="info-label">生成提示詞起點</div>
                <div class="prompt-output" id="promptOutput"></div>
                <div class="btn-row">
                  <button class="btn-primary" id="copyPromptBtn">複製提示詞</button>
                  <button class="btn-ghost" id="sendToWorkflowBtn">送至工作流</button>
                  <button class="btn-ghost" id="resetDecodeBtn">重新上傳</button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <canvas id="analysisCanvas" hidden></canvas>
      </section>

      <!-- Panel: 提示詞庫 -->
      <section class="panel" id="panel-prompts">
        <div class="prompts-toolbar">
          <input type="text" class="search-input" id="promptSearch" placeholder="搜尋提示詞...">
          <button class="btn-primary" id="addPromptBtn">+ 新增提示詞</button>
        </div>
        <div class="category-chips" id="categoryChips"></div>
        <div class="prompts-grid" id="promptsGrid"></div>
        <div class="empty-state hidden" id="promptsEmpty">
          <div class="empty-icon">&#9998;</div>
          <div class="empty-text">尚無提示詞，點擊右上角新增</div>
        </div>
      </section>

      <!-- Panel: 簡易工作流 -->
      <section class="panel" id="panel-workflow">
        <div class="workflow-header">
          <div class="workflow-desc">依照步驟完成圖像到提示詞的完整流程</div>
          <button class="btn-ghost" id="resetWorkflowBtn">重置流程</button>
        </div>
        <div class="workflow-pipeline" id="workflowPipeline"></div>
      </section>

    </div>
  </main>
</div>

<!-- Modal: 新增/編輯提示詞 -->
<div class="modal-backdrop hidden" id="promptModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">新增提示詞</div>
      <button class="modal-close" id="modalClose">&#x2715;</button>
    </div>
    <div class="modal-body">
      <label class="form-label">標題</label>
      <input type="text" class="form-input" id="promptTitleInput" placeholder="提示詞名稱">
      <label class="form-label">分類</label>
      <select class="form-input" id="promptCategoryInput">
        <option value="Midjourney">Midjourney</option>
        <option value="SD">Stable Diffusion</option>
        <option value="General">General</option>
        <option value="Style">Style</option>
        <option value="其他">其他</option>
      </select>
      <label class="form-label">提示詞內容</label>
      <textarea class="form-textarea" id="promptContentInput" placeholder="輸入提示詞..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" id="modalCancel">取消</button>
      <button class="btn-primary" id="modalSave">儲存</button>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div class="toast hidden" id="toast"></div>

<script src="js/app.js"></script>
<script src="js/decode.js"></script>
<script src="js/prompts.js"></script>
<script src="js/workflow.js"></script>
</body>
</html>
